prover-entrypoint = "http://xlayer-agglayer-prover:4445"
debug-mode = true

# Only supported by fork 12+
mock-verifier = true

[full-node-rpcs]
# TODO switch this to permissionless
1 = "http://op-geth-rpc:8545"

[proof-signers]
1 = "0xf39fd6e51aad88f6f4ce6ab8827279cfffb92266"

[rpc]
grpc-port = 4443
readrpc-port = 4444
admin-port = 4446
host = "0.0.0.0"
request-timeout = 180
# size is define in bytes e.g. 100 * 1024 * 1024
# same for `max_response_body_size`
# default value is equal to 10MB
max-request-body-size = 104857600

[prover.grpc]
# size is define in bytes e.g. 100 * 1024 * 1024
# same for `max-encoding-message-size`
# default value is equal to 4MB
max-decoding-message-size = 104857600

[outbound.rpc.settle]
max-retries = 3
retry-interval = 7
confirmations = 1
settlement-timeout = 1200

[log]
# level = "info"
# we want debug visibility here for now
level = "debug"
outputs = ["stderr"]
format = "json"

[auth.local]
private-keys = [
    { path = "/etc/zkevm/agglayer.keystore", password = "testonly" },
]

[l1]
chain-id = 1337
node-url = "http://l1-geth:8545"
ws-node-url = "ws://l1-geth:8546"
rollup-manager-contract = "0xE96dBF374555C6993618906629988d39184716B3"
polygon-zkevm-global-exit-root-v2-contract = "0xB8cedD4B9eF683f0887C44a6E4312dC7A6e2fcdB"
rpc-timeout = 45

[l2]
rpc-timeout = 45

[telemetry]
prometheus-addr = "0.0.0.0:9092"

# https://github.com/orgs/agglayer/discussions/213

[rate-limiting]
send-tx = "unlimited"
# [rate-limiting.send-tx]
# max-per-interval = 1
# time-interval = "15m"

[rate-limiting.network]

[epoch.block-clock]
epoch-duration = 6
genesis-block = 0

[shutdown]
runtime-timeout = 5

[certificate-orchestrator]
input-backpressure-buffer-size = 1000

[certificate-orchestrator.prover.sp1-local]

[storage]
db-path = "/etc/zkevm/storage"

[storage.backup]
path = "/etc/zkevm/backups"
state-max-backup-count = 100
pending-max-backup-count = 100