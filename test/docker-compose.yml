networks:
  default:
    name: ${DOCKER_NETWORK:-dev-op}

services:
  l1-geth-remove-db:
    image: "alpine:3.19.0"
    container_name: l1-geth-remove-db
    command: rm -rf /execution/geth
    volumes:
      - ./l1-geth/execution:/execution

  l1-beacon-remove-db:
    image: "alpine:3.19.0"
    container_name: l1-beacon-remove-db
    command: rm -rf /consensus/beacondata /consensus/validatordata /consensus/genesis.ssz
    volumes:
      - ./l1-geth/consensus:/consensus

  l1-create-beacon-chain-genesis:
    image: "gcr.io/prysmaticlabs/prysm/cmd/prysmctl:HEAD-aec349"
    container_name: l1-create-beacon-chain-genesis
    command:
      - testnet
      - generate-genesis
      - --fork=deneb
      - --num-validators=4
      - --genesis-time-delay=0
      - --output-ssz=/consensus/genesis.ssz
      - --chain-config-file=/consensus/config.yml
      - --geth-genesis-json-in=/execution/genesis-raw.json
      - --geth-genesis-json-out=/execution/genesis.json
    volumes:
      - ./l1-geth/consensus:/consensus
      - ./l1-geth/execution:/execution
    depends_on:
      l1-beacon-remove-db:
        condition: service_completed_successfully

  l1-fix-genesis-fork-times:
    image: "alpine:3.19.0"
    container_name: l1-fix-genesis-fork-times
    command:
      - /bin/sh
      - -c
      - |
        echo "Fixing genesis.json fork times..."
        sed -i 's/"shanghaiTime": [0-9]*/"shanghaiTime": 0/g' /execution/genesis.json
        sed -i 's/"cancunTime": [0-9]*/"cancunTime": 0/g' /execution/genesis.json
        echo "Genesis.json: shanghai=0, cancun=0 (MCOPY enabled)"
        cat /execution/genesis.json | grep -E "(shanghaiTime|cancunTime)"
    volumes:
      - ./l1-geth/execution:/execution
    depends_on:
      l1-create-beacon-chain-genesis:
        condition: service_completed_successfully

  l1-geth-genesis:
    image: "ethereum/client-go:v1.14.5"
    container_name: l1-geth-genesis
    command: --datadir=/execution --gcmode=archive init --state.scheme=hash /execution/genesis.json
    volumes:
      - ./l1-geth/execution:/execution
      - ./l1-geth/execution/genesis.json:/execution/genesis.json
    depends_on:
      l1-fix-genesis-fork-times:
        condition: service_completed_successfully
      l1-geth-remove-db:
        condition: service_completed_successfully

  l1-geth:
    image: "ethereum/client-go:v1.14.5"
    container_name: l1-geth
    command:
      - --http
      - --http.api=eth,net,web3,debug,admin
      - --http.addr=0.0.0.0
      - --http.corsdomain=*
      - --http.vhosts=*
      - --ws
      - --ws.api=eth,net,web3,debug
      - --ws.addr=0.0.0.0
      - --ws.origins=*
      - --authrpc.vhosts=*
      - --authrpc.addr=0.0.0.0
      - --authrpc.jwtsecret=/execution/jwtsecret
      - --datadir=/execution
      - --allow-insecure-unlock
      - --unlock=0x123463a4b065722e99115d6c222f267d9cabb524
      - --password=/execution/geth_password.txt
      - --nodiscover
      - --syncmode=full
      - --gcmode=archive
      - --ipcdisable
      - --rpc.allow-unprotected-txs
      - --verbosity=3
    ports:
      - 8551:8551
      - 8545:8545
      - 8546:8546
    depends_on:
      l1-geth-genesis:
        condition: service_completed_successfully
    volumes:
      - ./l1-geth/execution:/execution
      - ./l1-geth/execution/jwtsecret:/execution/jwtsecret
      - ./l1-geth/execution/geth_password.txt:/execution/geth_password.txt
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8545"]
      interval: 10s
      timeout: 5s
      retries: 5

  l1-beacon-chain:
    image: "gcr.io/prysmaticlabs/prysm/beacon-chain:v4.1.1"
    container_name: l1-beacon-chain
    command:
      - --datadir=/consensus/beacondata
      - --min-sync-peers=0
      - --genesis-state=/consensus/genesis.ssz
      - --bootstrap-node=
      - --interop-eth1data-votes
      - --chain-config-file=/consensus/config.yml
      - --contract-deployment-block=0
      - --chain-id=${CHAIN_ID:-1337}
      - --rpc-host=0.0.0.0
      - --grpc-gateway-host=0.0.0.0
      - --execution-endpoint=http://l1-geth:8551
      - --accept-terms-of-use
      - --jwt-secret=/execution/jwtsecret
      - --suggested-fee-recipient=0x123463a4b065722e99115d6c222f267d9cabb524
      - --minimum-peers-per-subnet=0
      - --enable-debug-rpc-endpoints
      - --verbosity=info
    depends_on:
      l1-create-beacon-chain-genesis:
        condition: service_completed_successfully
      l1-geth:
        condition: service_healthy
    ports:
      - 4000:4000
      - 3500:3500
      - 18080:8080
      - 6060:6060
      - 19090:9090
    volumes:
      - ./l1-geth/consensus:/consensus
      - ./l1-geth/execution:/execution
      - ./l1-geth/execution/jwtsecret:/execution/jwtsecret

  l1-validator:
    image: "gcr.io/prysmaticlabs/prysm/validator:v4.1.1"
    container_name: l1-validator
    command:
      - --beacon-rpc-provider=l1-beacon-chain:4000
      - --datadir=/consensus/validatordata
      - --accept-terms-of-use
      - --interop-num-validators=4
      - --interop-start-index=0
      - --chain-config-file=/consensus/config.yml
      - --verbosity=info
    depends_on:
      l1-beacon-chain:
        condition: service_started
    volumes:
      - ./l1-geth/consensus:/consensus

  op-geth-seq:
    image: "${OP_GETH_IMAGE_TAG}"
    container_name: op-geth-seq
    entrypoint: geth
    volumes:
      - ./data/op-geth-seq:/datadir
      - ./config-op/jwt.txt:/jwt.txt
      - ./config-op/test.seq.config.toml:/config.toml
    ports:
      - "8123:8545"
      - "7546:7546"
      - "8552:8552"
      - "30303:30303"
      - "30303:30303/udp"
    command:
      - --datadir=/datadir
      - --db.engine=${DB_ENGINE}
      - --config=/config.toml
      - --gcmode=archive
      - --rollup.disabletxpoolgossip=false
      - --verbosity=5

  op-geth-rpc:
    image: "${OP_GETH_IMAGE_TAG}"
    container_name: op-geth-rpc
    entrypoint: geth
    volumes:
      - ./data/op-geth-rpc:/datadir
      - ./config-op/jwt.txt:/jwt.txt
      - ./config-op/test.rpc.config.toml:/config.toml
      - ./config-op/test.rpc.rt.config.toml:/config.rt.toml
    ports:
      - "8124:8545"
      - "7547:7546"
    command:
      - --datadir=/datadir
      - --db.engine=${DB_ENGINE}
      - --config=${CONFIG_FILE:-/config.toml}
      - --gcmode=archive
      - --rollup.sequencerhttp=http://op-geth-seq:8545
      - --rollup.enabletxpooladmission
      - --verbosity=5

  op-geth-rpc-2:
    image: "${OP_GETH_IMAGE_TAG}"
    container_name: op-geth-rpc-2
    entrypoint: geth
    volumes:
      - ./data/op-geth-rpc-2:/datadir
      - ./config-op/jwt.txt:/jwt.txt
      - ./config-op/test.rpc.config.toml:/config.toml
    ports:
      - "8128:8545"
    command:
      - --datadir=/datadir
      - --db.engine=${DB_ENGINE}
      - --config=/config.toml
      - --gcmode=archive
      - --rollup.sequencerhttp=http://op-geth-seq:8545
      - --rollup.enabletxpooladmission
      - --verbosity=5

  op-seq:
    image: "${OP_STACK_IMAGE_TAG}"
    container_name: op-seq
    volumes:
      - ./config-op/rollup.json:/rollup.json
      - ./config-op/jwt.txt:/jwt.txt
      - ./data/op-seq:/data
    ports:
      - "9545:9545"
      - "7070:7070"
      - "9223:9223"
      - "9223:9223/udp"
    command:
      - /app/op-node/bin/op-node
      - --log.level=debug
      - --l2=http://op-geth-seq:8552
      - --l2.jwt-secret=/jwt.txt
      - --sequencer.enabled
      - --sequencer.l1-confs=5
      - --verifier.l1-confs=1
      - --rollup.config=/rollup.json
      - --rpc.addr=0.0.0.0
      - --p2p.listen.tcp=9223
      - --p2p.listen.udp=9223
      - --p2p.priv.raw=e054b5748fb29a82994ea170af9e6094a163a0d11308dea91a38744c4e7c94da
      - --p2p.peerstore.path=/data/p2p/opnode_peerstore_db
      - --p2p.discovery.path=/data/p2p/opnode_discovery_db
      - --p2p.no-discovery
      - --rpc.enable-admin
      - --p2p.sequencer.key=${SEQUENCER_P2P_KEY}
      - --l1=${L1_RPC_URL_IN_DOCKER}
      - --l1.beacon=${L1_BEACON_URL_IN_DOCKER}
      - --l1.rpckind=standard
      - --safedb.path=/data/safedb
      - --conductor.enabled=${CONDUCTOR_ENABLED:-false}    # 默认关闭
      - --conductor.rpc=http://op-conductor:8547
      - --realtime.sequencer-enabled=true
      - --realtime.kafka-sync-bootstrap-servers=xlayer-kafka:9092
      - --realtime.kafka-sync-block-topic=xlayer-header
      - --realtime.kafka-sync-error-topic=xlayer-error
      - --realtime.kafka-sync-client-id=xlayer-producer-cl
      - --realtime.kafka-sync-group-id=xlayer-producer-cl-1
    depends_on:
      - op-geth-seq

  op-rpc:
    image: "${OP_STACK_IMAGE_TAG}"
    container_name: op-rpc
    volumes:
      - ./data/op-rpc:/data
      - ./config-op/rollup.json:/rollup.json
      - ./config-op/jwt.txt:/jwt.txt
      - ./config-op/oprpc_p2p_priv.txt:/opnode_p2p_priv.txt
    ports:
      - "9555:9545"
    command:
      - /app/op-node/bin/op-node
      - --log.level=debug
      - --l2=http://op-geth-rpc:8552
      - --l2.jwt-secret=/jwt.txt
      - --sequencer.enabled=false
      - --verifier.l1-confs=1
      - --rollup.config=/rollup.json
      - --rpc.addr=0.0.0.0
      - --rpc.port=9545
      - --p2p.listen.tcp=9223
      - --p2p.listen.udp=9223
      - --p2p.priv.raw=604557d042fbea9ed42f46c0c95c346a932b6a5ef0c0dd07a00dbf95801a2510
      - --p2p.peerstore.path=/data/p2p/opnode_peerstore_db
      - --p2p.discovery.path=/data/p2p/opnode_discovery_db
      - --p2p.static=/dns4/op-seq/tcp/9223/p2p/16Uiu2HAkzHdkbmS2VrCsccLibsu7MvGHpmFUMJnMTkKifrtS5m65
      - --p2p.no-discovery
      - --rpc.enable-admin=true
      - --l1=${L1_RPC_URL_IN_DOCKER}
      - --l1.beacon=${L1_BEACON_URL_IN_DOCKER}
      - --l1.rpckind=standard
      - --safedb.path=/data/safedb
      - --realtime.sequencer-enabled=false
    depends_on:
      - op-geth-rpc

  op-rpc-2:
    image: "${OP_STACK_IMAGE_TAG}"
    container_name: op-rpc-2
    volumes:
      - ./data/op-rpc-2:/data
      - ./config-op/rollup.json:/rollup.json
      - ./config-op/jwt.txt:/jwt.txt
      - ./config-op/oprpc_p2p_priv.txt:/opnode_p2p_priv.txt
    ports:
      - "9565:9545"
    command:
      - /app/op-node/bin/op-node
      - --log.level=debug
      - --l2=http://op-geth-rpc-2:8552
      - --l2.jwt-secret=/jwt.txt
      - --sequencer.enabled=false
      - --verifier.l1-confs=1
      - --rollup.config=/rollup.json
      - --rpc.addr=0.0.0.0
      - --rpc.port=9545
      - --p2p.listen.tcp=9223
      - --p2p.listen.udp=9223
      - --p2p.priv.raw=096648ce9102985f9a57a12fa8138c4892a881f7b99dc7e84ede99b7ba24ffe7
      - --p2p.peerstore.path=/data/p2p/opnode_peerstore_db
      - --p2p.discovery.path=/data/p2p/opnode_discovery_db
      - --p2p.static=/dns4/op-seq/tcp/9223/p2p/16Uiu2HAkzHdkbmS2VrCsccLibsu7MvGHpmFUMJnMTkKifrtS5m65
      - --p2p.no-discovery
      - --rpc.enable-admin=true
      - --l1=${L1_RPC_URL_IN_DOCKER}
      - --l1.beacon=${L1_BEACON_URL_IN_DOCKER}
      - --l1.rpckind=standard
      - --safedb.path=/data/safedb
      - --realtime.sequencer-enabled=false
    depends_on:
      - op-geth-rpc-2

  op-conductor:
    image: "${OP_STACK_IMAGE_TAG}"
    container_name: op-conductor
    volumes:
      - ./data/op-conductor:/data
      - ./config-op/rollup.json:/rollup.json
    ports:
      - "8547:8547"  # RPC port
      - "50050:50050"  # Consensus port
    command:
      - /app/op-conductor/bin/op-conductor
      - --log.level=debug
      # already existed service
      - --node.rpc=http://op-seq:9545
      - --execution.rpc=http://op-geth-seq:8545
      # Raft Config
      - --raft.server.id=conductor-1
      - --raft.storage.dir=/data/raft
      - --raft.bootstrap=true
      - --consensus.addr=0.0.0.0
      - --consensus.port=50050
      - --consensus.advertised=op-conductor:50050
      # RPC Config
      - --rpc.addr=0.0.0.0
      - --rpc.port=8547
      - --rpc.enable-proxy=true
      # Healthcheck Config
      - --healthcheck.interval=1
      - --healthcheck.unsafe-interval=3
      - --healthcheck.min-peer-count=1
      - --rollup.config=/rollup.json
    depends_on:
      - op-seq
      - op-geth-seq

  op-batcher:
    image: "${OP_STACK_IMAGE_TAG}"
    container_name: op-batcher
    command:
      - /app/op-batcher/bin/op-batcher
      - --log.level=debug
      - --l2-eth-rpc=http://op-geth-seq:8545
      - --rollup-rpc=http://op-seq:9545
      - --poll-interval=1s
      - --sub-safety-margin=6
      - --num-confirmations=1
      - --safe-abort-nonce-too-low-count=3
      - --resubmission-timeout=30s
      - --rpc.addr=0.0.0.0
      - --rpc.port=8548
      - --rpc.enable-admin
      - --max-channel-duration=25
      - --l1-eth-rpc=${L1_RPC_URL_IN_DOCKER}
      - --private-key=${OP_BATCHER_PRIVATE_KEY}
      - --throttle-always-block-size=1300000
    depends_on:
      - op-seq

  op-proposer:
    image: "${OP_STACK_IMAGE_TAG}"
    container_name: op-proposer
    environment:
      - DISPUTE_GAME_FACTORY_ADDRESS=${DISPUTE_GAME_FACTORY_ADDRESS}
    command:
      - /app/op-proposer/bin/op-proposer
      - --log.level=debug
      - --poll-interval=2s
      - --rpc.port=8560
      - --rollup-rpc=http://op-seq:9545
      - --game-factory-address=${DISPUTE_GAME_FACTORY_ADDRESS}
      - --proposal-interval=1m
      - --private-key=${OP_PROPOSER_PRIVATE_KEY}
      - --l1-eth-rpc=${L1_RPC_URL_IN_DOCKER}
      - --game-type=${GAME_TYPE}
      - --allow-non-finalized
      - --genesis-height=${FORK_BLOCK}
    depends_on:
      - op-batcher

  op-challenger:
    image: "${OP_STACK_IMAGE_TAG}"
    container_name: op-challenger
    environment:
      - L1_RPC_URL_IN_DOCKER=${L1_RPC_URL_IN_DOCKER}
      - L1_BEACON_URL_IN_DOCKER=${L1_BEACON_URL_IN_DOCKER}
      - DISPUTE_GAME_FACTORY_ADDRESS=${DISPUTE_GAME_FACTORY_ADDRESS}
    volumes:
      - ./data/cannon-data:/data
      - ./config-op/rollup.json:/rollup.json
      - ./config-op/genesis.json:/l2-genesis.json
    depends_on:
      - op-seq
    command:
      - /app/op-challenger/bin/op-challenger
      - --log.level=debug
      - --l1-eth-rpc=${L1_RPC_URL_IN_DOCKER}
      - --l1-beacon=${L1_BEACON_URL_IN_DOCKER}
      - --l2-eth-rpc=http://op-geth-seq:8545
      - --rollup-rpc=http://op-seq:9545
      - --game-factory-address=${DISPUTE_GAME_FACTORY_ADDRESS}
      - --cannon-bin=/app/cannon/bin/cannon
      - --cannon-server=/data/op-program
      - --cannon-prestate=/data/prestate-mt64.bin.gz
      - --cannon-rollup-config=/rollup.json
      - --cannon-l2-genesis=/l2-genesis.json
      - --private-key=${OP_PROPOSER_PRIVATE_KEY}
      - --trace-type=cannon,permissioned
      - --datadir=/data
      - --game-window=${GAME_WINDOW}s

  op-dispute-mon:
    image: "${OP_STACK_IMAGE_TAG}"
    container_name: op-dispute-mon
    depends_on:
      - op-challenger
      - op-proposer
    command:
      - /app/op-dispute-mon/bin/op-dispute-mon
      - --l1-eth-rpc=${L1_RPC_URL_IN_DOCKER}
      - --rollup-rpc=http://op-seq:9545
      - --game-factory-address=${DISPUTE_GAME_FACTORY_ADDRESS}
      - --game-window=${GAME_WINDOW}s
      - --honest-actors=${PROPOSER_ADDRESS}



  op-geth-seq2:
    image: "${OP_GETH_IMAGE_TAG}"
    container_name: op-geth-seq2
    entrypoint: geth
    volumes:
      - ./data/op-geth-seq2:/datadir
      - ./config-op/jwt.txt:/jwt.txt
    ports:
      - "8223:8545"
    command:
      - --datadir=/datadir
      - --db.engine=${DB_ENGINE}
      - --http
      - --http.corsdomain=*
      - --http.vhosts=*
      - --http.port=8545
      - --http.addr=0.0.0.0
      - --http.api=web3,debug,eth,txpool,net,engine,miner
      - --ws
      - --ws.addr=0.0.0.0
      - --ws.port=7546
      - --ws.origins=*
      - --ws.api=debug,eth,txpool,net,engine
      - --syncmode=full
      - --gcmode=archive
      - --nodiscover
      - --maxpeers=0
      - --networkid=901
      - --authrpc.vhosts=*
      - --authrpc.addr=0.0.0.0
      - --authrpc.port=8552
      - --authrpc.jwtsecret=/jwt.txt
      - --rollup.disabletxpoolgossip=false

  op-seq2:
    image: "${OP_STACK_IMAGE_TAG}"
    container_name: op-seq2
    volumes:
      - ./config-op/rollup.json:/rollup.json
      - ./config-op/jwt.txt:/jwt.txt
      - ./data/op-seq2:/data
    ports:
      - "9546:9545"
#      - "7070:7070"
      - "9224:9223"
      - "9224:9223/udp"
    command:
      - /app/op-node/bin/op-node
      - --log.level=info
      - --l2=http://op-geth-seq2:8552
      - --l2.jwt-secret=/jwt.txt
      - --sequencer.enabled
      - --sequencer.stopped
      - --sequencer.l1-confs=5
      - --verifier.l1-confs=1
      - --rollup.config=/rollup.json
      - --rpc.addr=0.0.0.0
      - --p2p.listen.tcp=9223
      - --p2p.listen.udp=9223
      - --p2p.priv.raw=cff9dac7588f5e6755a72d1e5b5001da3d0f8c06c4242b27d67eb5df4216bd93
      - --p2p.peerstore.path=/data/p2p/opnode_peerstore_db
      - --p2p.discovery.path=/data/p2p/opnode_discovery_db
      - --p2p.static=/dns4/op-seq/tcp/9223/p2p/16Uiu2HAkzHdkbmS2VrCsccLibsu7MvGHpmFUMJnMTkKifrtS5m65,/dns4/op-seq3/tcp/9223/p2p/16Uiu2HAmRDGMm3UUrP8CfQ3YQo9aaXEXFXA7LeFNztdPMNK5moyD
      - --p2p.no-discovery
      - --rpc.enable-admin
      - --p2p.sequencer.key=${SEQUENCER_P2P_KEY}
      - --l1=${L1_RPC_URL_IN_DOCKER}
      - --l1.beacon=${L1_BEACON_URL_IN_DOCKER}
      - --l1.rpckind=standard
      - --safedb.path=/data/safedb
      - --conductor.enabled=${CONDUCTOR_ENABLED:-false}
      - --conductor.rpc=http://op-conductor2:8547
    depends_on:
      - op-geth-seq2

  op-conductor2:
    image: "${OP_STACK_IMAGE_TAG}"
    container_name: op-conductor2
    volumes:
      - ./data/op-conductor2:/data
      - ./config-op/rollup.json:/rollup.json
    ports:
      - "8548:8547"  # RPC port
      - "50052:50050"  # Consensus port
    command:
      - /app/op-conductor/bin/op-conductor
      - --log.level=debug
      # already existed service
      - --node.rpc=http://op-seq2:9545
      - --execution.rpc=http://op-geth-seq2:8545
      # Raft Config
      - --raft.server.id=conductor-2
      - --raft.storage.dir=/data/raft
      - --raft.bootstrap=false
      - --consensus.addr=0.0.0.0
      - --consensus.port=50050
      - --consensus.advertised=op-conductor2:50050
      # RPC Config
      - --rpc.addr=0.0.0.0
      - --rpc.port=8547
      - --rpc.enable-proxy=true
      # Healthcheck Config
      - --healthcheck.interval=1
      - --healthcheck.unsafe-interval=3
      - --healthcheck.min-peer-count=1
      - --rollup.config=/rollup.json
    depends_on:
      - op-seq2
      - op-geth-seq2


  op-geth-seq3:
    image: "${OP_GETH_IMAGE_TAG}"
    container_name: op-geth-seq3
    entrypoint: geth
    volumes:
      - ./data/op-geth-seq3:/datadir
      - ./config-op/jwt.txt:/jwt.txt
    ports:
      - "8323:8545"
    command:
      - --datadir=/datadir
      - --db.engine=${DB_ENGINE}
      - --http
      - --http.corsdomain=*
      - --http.vhosts=*
      - --http.port=8545
      - --http.addr=0.0.0.0
      - --http.api=web3,debug,eth,txpool,net,engine,miner
      - --ws
      - --ws.addr=0.0.0.0
      - --ws.port=7546
      - --ws.origins=*
      - --ws.api=debug,eth,txpool,net,engine
      - --syncmode=full
      - --gcmode=archive
      - --nodiscover
      - --maxpeers=0
      - --networkid=901
      - --authrpc.vhosts=*
      - --authrpc.addr=0.0.0.0
      - --authrpc.port=8552
      - --authrpc.jwtsecret=/jwt.txt
      - --rollup.disabletxpoolgossip=false

  op-seq3:
    image: "${OP_STACK_IMAGE_TAG}"
    container_name: op-seq3
    volumes:
      - ./config-op/rollup.json:/rollup.json
      - ./config-op/jwt.txt:/jwt.txt
      - ./data/op-seq3:/data
    ports:
      - "9547:9545"
#      - "7070:7070"
      - "9225:9223"
      - "9225:9223/udp"
    command:
      - /app/op-node/bin/op-node
      - --log.level=info
      - --l2=http://op-geth-seq3:8552
      - --l2.jwt-secret=/jwt.txt
      - --sequencer.enabled
      - --sequencer.stopped
      - --sequencer.l1-confs=5
      - --verifier.l1-confs=1
      - --rollup.config=/rollup.json
      - --rpc.addr=0.0.0.0
      - --p2p.listen.tcp=9223
      - --p2p.listen.udp=9223
      - --p2p.priv.raw=10785157e7c98628e5e47c3d9b8ebbd12525c45f1554b4a39652b5ce02bb29dc
      - --p2p.peerstore.path=/data/p2p/opnode_peerstore_db
      - --p2p.discovery.path=/data/p2p/opnode_discovery_db
      - --p2p.static=/dns4/op-seq/tcp/9223/p2p/16Uiu2HAkzHdkbmS2VrCsccLibsu7MvGHpmFUMJnMTkKifrtS5m65,/dns4/op-seq2/tcp/9223/p2p/16Uiu2HAmDTjVuEF6V9DccV1JhrHg7DYc5SKm3bw2T75kAFPsGuSp
      - --p2p.no-discovery
      - --rpc.enable-admin
      - --p2p.sequencer.key=${SEQUENCER_P2P_KEY}
      - --l1=${L1_RPC_URL_IN_DOCKER}
      - --l1.beacon=${L1_BEACON_URL_IN_DOCKER}
      - --l1.rpckind=standard
      - --safedb.path=/data/safedb
      - --conductor.enabled=${CONDUCTOR_ENABLED:-false}
      - --conductor.rpc=http://op-conductor3:8547
    depends_on:
      - op-geth-seq3

  op-conductor3:
    image: "${OP_STACK_IMAGE_TAG}"
    container_name: op-conductor3
    volumes:
      - ./data/op-conductor3:/data
      - ./config-op/rollup.json:/rollup.json
    ports:
      - "8549:8547"  # RPC port
      - "50053:50050"  # Consensus port
    command:
      - /app/op-conductor/bin/op-conductor
      - --log.level=debug
      # already existed service
      - --node.rpc=http://op-seq3:9545
      - --execution.rpc=http://op-geth-seq3:8545
      # Raft Config
      - --raft.server.id=conductor-3
      - --raft.storage.dir=/data/raft
      - --raft.bootstrap=false
      - --consensus.addr=0.0.0.0
      - --consensus.port=50050
      - --consensus.advertised=op-conductor3:50050
      # RPC Config
      - --rpc.addr=0.0.0.0
      - --rpc.port=8547
      - --rpc.enable-proxy=true
      # Healthcheck Config
      - --healthcheck.interval=1
      - --healthcheck.unsafe-interval=3
      - --healthcheck.min-peer-count=1
      - --rollup.config=/rollup.json
    depends_on:
      - op-seq3
      - op-geth-seq3

  xlayer-kafka:
    image: bitnamilegacy/kafka:4.0.0-debian-12-r10
    container_name: xlayer-kafka
    ports:
      - 9095:9094
    environment:
      # Configs
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@xlayer-kafka:9093
      - KAFKA_MESSAGE_MAX_BYTES=30000000
      # Listeners
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://:9092,EXTERNAL://localhost:9095
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
