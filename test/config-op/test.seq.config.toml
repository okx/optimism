[Node]
HTTPHost = "0.0.0.0"
HTTPPort = 8545
HTTPCors = ["*"]
HTTPVirtualHosts = ["*"]
HTTPModules = ["web3", "debug", "eth", "txpool", "net", "engine", "miner"]
WSHost = "0.0.0.0"
WSPort = 7546
WSOrigins = ["*"]
WSModules = ["debug", "eth", "txpool", "net", "engine"]
AuthAddr = "0.0.0.0"
AuthPort = 8552
AuthVirtualHosts = ["*"]
JWTSecret = "/jwt.txt"

[Node.P2P]
MaxPeers = 0
NoDiscovery = true

[Eth]
NetworkId = 901
SyncMode = "full"
EnableInnerTx = true

[Eth.XLayer.Apollo]
Enable = true
AppID = "XLayerSeq"
IP = "http://apollo-configservice:8085"
Cluster = "default"
NamespaceName = "sequencer-config.txt,l2gaspricer-config.txt,pool-config.txt"


[Eth.TxPool]
GlobalSlots = 500000
GlobalQueue = 100000
AccountSlots = 50000
AccountQueue = 10000
