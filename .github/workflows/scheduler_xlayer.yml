name: X Layer Optimism Scheduled CI

# Schedule daily runs at 2:30 PM Beijing Time (UTC+8)
on:
  schedule:
    - cron: '30 6 * * *'   # 14:30 Beijing Time (UTC+8 = 06:30 UTC)
  workflow_dispatch:      # Allow manual trigger

# Ensure only one workflow runs at a time
concurrency:
  group: scheduler-xlayer-${{ github.ref }}
  cancel-in-progress: true

env:
  GOPRIVATE: "github.com/ethereum-optimism"
  TEST_TIMEOUT: "10m"

jobs:
  ##############################################################################
  # Phase 0: Sync from Upstream
  ##############################################################################

  sync-upstream:
    name: Sync from upstream (okx/optimism)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout current branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: recursive

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/okx/optimism.git || true
          git remote -v

      - name: Fetch upstream
        run: |
          echo "Fetching from upstream okx/optimism..."
          git fetch upstream dev

      - name: Merge upstream/dev into current branch
        id: merge
        continue-on-error: true
        run: |
          echo "Current branch: $(git branch --show-current)"
          echo "Attempting to merge upstream/dev..."

          if git merge --no-edit upstream/dev; then
            echo "✅ Merge successful"
            echo "merge_status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ Merge conflict detected"
            echo "merge_status=conflict" >> $GITHUB_OUTPUT
            git merge --abort
            exit 1
          fi

      - name: Push merged changes
        if: steps.merge.outputs.merge_status == 'success'
        run: |
          echo "Pushing changes to origin..."
          git push origin HEAD:${{ github.ref_name }}
          echo "✅ Successfully synced from upstream and pushed to origin"

      - name: Generate sync summary
        if: always()
        run: |
          echo "## 🔄 Upstream Sync Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Upstream:** https://github.com/okx/optimism (dev branch)" >> $GITHUB_STEP_SUMMARY
          echo "**Target Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ steps.merge.outputs.merge_status }}" == "success" ]]; then
            echo "✅ **Successfully synced from upstream**" >> $GITHUB_STEP_SUMMARY

            # Show recent commits from upstream
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Recent Upstream Changes" >> $GITHUB_STEP_SUMMARY
            git log --oneline --graph --decorate -10 >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Merge conflict detected**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ Please resolve conflicts manually:" >> $GITHUB_STEP_SUMMARY
            echo "1. Clone the repository" >> $GITHUB_STEP_SUMMARY
            echo "2. Run: \`git remote add upstream https://github.com/okx/optimism.git\`" >> $GITHUB_STEP_SUMMARY
            echo "3. Run: \`git fetch upstream\`" >> $GITHUB_STEP_SUMMARY
            echo "4. Run: \`git merge upstream/dev\`" >> $GITHUB_STEP_SUMMARY
            echo "5. Resolve conflicts and push" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail workflow if merge conflict
        if: steps.merge.outputs.merge_status != 'success'
        run: |
          echo "::error::Merge conflict detected. Please resolve manually."
          exit 1

  ##############################################################################
  # Phase 1: Build Dependencies
  ##############################################################################

  build-dependencies:
    needs: [sync-upstream]
    name: Build Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install Just
        uses: extractions/setup-just@v2

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Cache Forge dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.foundry/cache
            packages/contracts-bedrock/cache
            packages/contracts-bedrock/forge-artifacts
          key: ${{ runner.os }}-foundry-${{ hashFiles('packages/contracts-bedrock/foundry.toml', 'packages/contracts-bedrock/lib/**') }}
          restore-keys: |
            ${{ runner.os }}-foundry-

      - name: Build contracts
        run: make build-contracts

      - name: Build test dependencies
        run: |
          make op-program-client
          make op-program-host
          make cannon
          make cannon-prestates
          make make-pre-test

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            bin/
            packages/contracts-bedrock/forge-artifacts/
            op-program/bin/
          retention-days: 1

      - name: Generate build summary
        if: always()
        run: |
          echo "## 🔨 Build Dependencies" >> $GITHUB_STEP_SUMMARY
          if [ $? -eq 0 ]; then
            echo "✅ **All dependencies built successfully**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Build failed**" >> $GITHUB_STEP_SUMMARY
          fi

  ##############################################################################
  # Phase 2: Code Quality Checks
  ##############################################################################

  lint-go:
    needs: [sync-upstream]
    name: Go Linting
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          args: --timeout=10m

      - name: Run go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Generate lint summary
        if: always()
        run: |
          echo "## 🔍 Go Linting" >> $GITHUB_STEP_SUMMARY
          if [ $? -eq 0 ]; then
            echo "✅ **All checks passed**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Linting issues found**" >> $GITHUB_STEP_SUMMARY
          fi

  semgrep-scan:
    needs: [sync-upstream]
    name: Semgrep Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Install Semgrep
        run: python3 -m pip install semgrep

      - name: Install Just
        uses: extractions/setup-just@v2

      - name: Run Semgrep
        continue-on-error: true
        run: |
          if [ -d ".semgrep/rules" ]; then
            just semgrep
          else
            echo "No custom semgrep rules found, skipping..."
          fi

      - name: Generate semgrep summary
        if: always()
        run: |
          echo "## 🛡️ Semgrep Security Scan" >> $GITHUB_STEP_SUMMARY
          echo "Security scan completed" >> $GITHUB_STEP_SUMMARY

  shellcheck:
    needs: [sync-upstream]
    name: Shell Script Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Install Just
        uses: extractions/setup-just@v2

      - name: Run ShellCheck
        continue-on-error: true
        run: just shellcheck

      - name: Generate shellcheck summary
        if: always()
        run: |
          echo "## 📜 Shell Script Check" >> $GITHUB_STEP_SUMMARY
          echo "ShellCheck completed" >> $GITHUB_STEP_SUMMARY

  ##############################################################################
  # Phase 3: Test Suite
  ##############################################################################

  unit-tests:
    needs: [build-dependencies]
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install Just
        uses: extractions/setup-just@v2

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Make binaries executable
        run: |
          chmod +x bin/* || true
          chmod +x op-program/bin/* || true

      - name: Run unit tests
        run: make test-unit

      - name: Generate test summary
        if: always()
        run: |
          echo "## 🧪 Unit Tests" >> $GITHUB_STEP_SUMMARY
          if [ $? -eq 0 ]; then
            echo "✅ **All unit tests passed**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Some unit tests failed**" >> $GITHUB_STEP_SUMMARY
          fi

  go-tests:
