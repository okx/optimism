  #     - name: Run acceptance tests
  #       working-directory: op-acceptance-tests
  #       run: just acceptance-test "" base
  #
  #     - name: Generate test summary
  #       if: always()
  #       run: |
  #         echo "## ✅ Acceptance Tests (Base)" >> $GITHUB_STEP_SUMMARY
  #         if [ $? -eq 0 ]; then
  #           echo "✅ **All acceptance tests passed**" >> $GITHUB_STEP_SUMMARY
  #         else
  #           echo "❌ **Some acceptance tests failed**" >> $GITHUB_STEP_SUMMARY
  #         fi

  ##############################################################################
  # Phase 4: Summary and Notification
  ##############################################################################

  summary:
    name: Generate Summary
    runs-on: ubuntu-latest
    needs: [sync-upstream, build-dependencies, lint-go, semgrep-scan, shellcheck, unit-tests, go-tests, go-tests-short, fraud-proof-tests, contracts-tests, op-e2e-actions-tests, contracts-static-checks, op-e2e-ws-tests, op-e2e-http-tests, cannon-tests]
    if: always()
    steps:
      - name: Generate comprehensive summary
        run: |
          echo "# 📊 X Layer Optimism CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Workflow Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Run ID:** ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Phase Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Phase | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY

          # Upstream Sync
          if [[ "${{ needs.sync-upstream.result }}" == "success" ]]; then
            echo "| 🔄 Upstream Sync | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🔄 Upstream Sync | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          # Build
          if [[ "${{ needs.build-dependencies.result }}" == "success" ]]; then
            echo "| 🔨 Build Dependencies | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🔨 Build Dependencies | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          # Code Quality
          if [[ "${{ needs.lint-go.result }}" == "success" ]]; then
            echo "| 🔍 Go Linting | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🔍 Go Linting | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ needs.semgrep-scan.result }}" == "success" ]]; then
            echo "| 🛡️ Semgrep Scan | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🛡️ Semgrep Scan | ⚠️ Warning |" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ needs.shellcheck.result }}" == "success" ]]; then
            echo "| 📜 ShellCheck | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 📜 ShellCheck | ⚠️ Warning |" >> $GITHUB_STEP_SUMMARY
          fi

          # Tests
          if [[ "${{ needs.unit-tests.result }}" == "success" ]]; then
            echo "| 🧪 Unit Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🧪 Unit Tests | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ needs.go-tests.result }}" == "success" ]]; then
            echo "| 🧪 Go Tests (Full) | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🧪 Go Tests (Full) | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ needs.go-tests-short.result }}" == "success" ]]; then
            echo "| 🧪 Go Tests (Short) | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🧪 Go Tests (Short) | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ needs.fraud-proof-tests.result }}" == "success" ]]; then
            echo "| 🎯 Fraud Proof Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🎯 Fraud Proof Tests | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          # New Tests
          if [[ "${{ needs.contracts-tests.result }}" == "success" ]]; then
            echo "| 🔨 Contracts Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🔨 Contracts Tests | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ needs.op-e2e-actions-tests.result }}" == "success" ]]; then
            echo "| 🎬 Op-E2E Actions Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🎬 Op-E2E Actions Tests | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ needs.contracts-static-checks.result }}" == "success" ]]; then
            echo "| 🔍 Contracts Static Checks | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🔍 Contracts Static Checks | ⚠️ Warning |" >> $GITHUB_STEP_SUMMARY
          fi

          # New Tests (Phase 2)
          if [[ "${{ needs.op-e2e-ws-tests.result }}" == "success" ]]; then
            echo "| 🌐 Op-E2E WebSocket Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🌐 Op-E2E WebSocket Tests | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ needs.op-e2e-http-tests.result }}" == "success" ]]; then
            echo "| 🔗 Op-E2E HTTP Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🔗 Op-E2E HTTP Tests | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ needs.cannon-tests.result }}" == "success" ]]; then
            echo "| 🎯 Cannon VM Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 🎯 Cannon VM Tests | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          # Acceptance Tests (Base) - Temporarily disabled
          # if [[ "${{ needs.acceptance-tests-base.result }}" == "success" ]]; then
          #   echo "| ✅ Acceptance Tests (Base) | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          # else
          #   echo "| ✅ Acceptance Tests (Base) | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          # fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # Overall Status
          if [[ "${{ needs.sync-upstream.result }}" == "success" ]] && \
             [[ "${{ needs.build-dependencies.result }}" == "success" ]] && \
             [[ "${{ needs.lint-go.result }}" == "success" ]] && \
             [[ "${{ needs.unit-tests.result }}" == "success" ]] && \
             [[ "${{ needs.go-tests.result }}" == "success" ]] && \
             [[ "${{ needs.go-tests-short.result }}" == "success" ]] && \
             [[ "${{ needs.fraud-proof-tests.result }}" == "success" ]] && \
             [[ "${{ needs.contracts-tests.result }}" == "success" ]] && \
             [[ "${{ needs.op-e2e-actions-tests.result }}" == "success" ]] && \
             [[ "${{ needs.op-e2e-ws-tests.result }}" == "success" ]] && \
             [[ "${{ needs.op-e2e-http-tests.result }}" == "success" ]] && \
             [[ "${{ needs.cannon-tests.result }}" == "success" ]]; then
             # [[ "${{ needs.acceptance-tests-base.result }}" == "success" ]]; then  # Temporarily disabled
            echo "## ✅ Overall Status: SUCCESS" >> $GITHUB_STEP_SUMMARY
            echo "all_passed" > status.txt
          else
            echo "## ❌ Overall Status: FAILED" >> $GITHUB_STEP_SUMMARY
            echo "some_failed" > status.txt
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "View detailed logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY

      - name: Upload summary
        uses: actions/upload-artifact@v4
        with:
          name: ci-summary
          path: status.txt
          retention-days: 30

  notify:
    name: Send Lark Notification
    runs-on: ubuntu-latest
    needs: [summary, sync-upstream, build-dependencies, lint-go, unit-tests, go-tests, go-tests-short, fraud-proof-tests, contracts-tests, op-e2e-actions-tests, contracts-static-checks, op-e2e-ws-tests, op-e2e-http-tests, cannon-tests]
    if: always()
    steps:
      - name: Install jq
        run: |
          if ! command -v jq &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y jq
          fi
          jq --version

      - name: Determine Status and Send Notification
        env:
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
        run: |
          # Determine overall status and color
          if [[ "${{ needs.sync-upstream.result }}" == "success" ]] && \
             [[ "${{ needs.build-dependencies.result }}" == "success" ]] && \
             [[ "${{ needs.lint-go.result }}" == "success" ]] && \
             [[ "${{ needs.unit-tests.result }}" == "success" ]] && \
             [[ "${{ needs.go-tests.result }}" == "success" ]] && \
             [[ "${{ needs.go-tests-short.result }}" == "success" ]] && \
             [[ "${{ needs.fraud-proof-tests.result }}" == "success" ]] && \
             [[ "${{ needs.contracts-tests.result }}" == "success" ]] && \
             [[ "${{ needs.op-e2e-actions-tests.result }}" == "success" ]] && \
             [[ "${{ needs.op-e2e-ws-tests.result }}" == "success" ]] && \
             [[ "${{ needs.op-e2e-http-tests.result }}" == "success" ]] && \
             [[ "${{ needs.cannon-tests.result }}" == "success" ]]; then
             # [[ "${{ needs.acceptance-tests-base.result }}" == "success" ]]; then  # Temporarily disabled
            CARD_COLOR="green"
            STATUS_TEXT="✅ All tasks succeeded"
            STATUS_EMOJI="✅"
          else
            CARD_COLOR="red"
            STATUS_TEXT="❌ Some tasks failed"
            STATUS_EMOJI="❌"
          fi

          # Get current time in Beijing timezone
          CURRENT_TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')
          COMMIT_SHORT="${GITHUB_SHA:0:8}"

          # Build status for each check
          get_status_icon() {
            if [[ "$1" == "success" ]]; then
              echo "✅"
            else
              echo "❌"
            fi
          }

          SYNC_ICON=$(get_status_icon "${{ needs.sync-upstream.result }}")
          BUILD_ICON=$(get_status_icon "${{ needs.build-dependencies.result }}")
          LINT_ICON=$(get_status_icon "${{ needs.lint-go.result }}")
          UNIT_ICON=$(get_status_icon "${{ needs.unit-tests.result }}")
          FULL_ICON=$(get_status_icon "${{ needs.go-tests.result }}")
          SHORT_ICON=$(get_status_icon "${{ needs.go-tests-short.result }}")
          FRAUD_ICON=$(get_status_icon "${{ needs.fraud-proof-tests.result }}")
          CONTRACTS_ICON=$(get_status_icon "${{ needs.contracts-tests.result }}")
          ACTIONS_ICON=$(get_status_icon "${{ needs.op-e2e-actions-tests.result }}")
          STATIC_ICON=$(get_status_icon "${{ needs.contracts-static-checks.result }}")
          WS_ICON=$(get_status_icon "${{ needs.op-e2e-ws-tests.result }}")
          HTTP_ICON=$(get_status_icon "${{ needs.op-e2e-http-tests.result }}")
          CANNON_ICON=$(get_status_icon "${{ needs.cannon-tests.result }}")
          # ACCEPT_ICON=$(get_status_icon "${{ needs.acceptance-tests-base.result }}")  # Temporarily disabled

          # Build Lark Card JSON
          cat > lark_card.json <<EOF
          {
            "msg_type": "interactive",
            "card": {
              "header": {
                "title": {
                  "tag": "plain_text",
                  "content": "${STATUS_EMOJI} X Layer Optimism Scheduled CI Report"
                },
                "template": "${CARD_COLOR}"
              },
              "elements": [
                {
                  "tag": "div",
                  "fields": [
                    {
                      "is_short": true,
                      "text": {
                        "tag": "lark_md",
                        "content": "**📅 Run Time**\n${CURRENT_TIME}"
                      }
                    },
                    {
                      "is_short": true,
                      "text": {
                        "tag": "lark_md",
                        "content": "**🔀 Branch**\n${{ github.ref_name }}"
                      }
                    },
                    {
                      "is_short": true,
                      "text": {
                        "tag": "lark_md",
                        "content": "**📝 Commit**\n${COMMIT_SHORT}"
                      }
                    },
                    {
                      "is_short": true,
                      "text": {
                        "tag": "lark_md",
                        "content": "**🔢 Run ID**\n${{ github.run_id }}"
                      }
                    }
                  ]
                },
                {
                  "tag": "hr"
                },
                {
                  "tag": "div",
                  "text": {
                    "tag": "lark_md",
                    "content": "**Check Status**"
                  }
                },
                {
                  "tag": "div",
                  "fields": [
                    {
                      "is_short": true,
                      "text": {
                        "tag": "lark_md",
                        "content": "${SYNC_ICON} Upstream Sync"
                      }
                    },
                    {
                      "is_short": true,
                      "text": {
                        "tag": "lark_md",
                        "content": "${BUILD_ICON} Build Dependencies"
                      }
                    },
                    {
                      "is_short": true,
                      "text": {
                        "tag": "lark_md",
                        "content": "${LINT_ICON} Go Linting"
                      }
                    },
                    {
                      "is_short": true,
                      "text": {
                        "tag": "lark_md",
                        "content": "${UNIT_ICON} Unit Tests"
                      }
                    },
                    {
                      "is_short": true,
                      "text": {
                        "tag": "lark_md",
                        "content": "${FULL_ICON} Go Tests (Full)"
                      }
                    },
                    {
                      "is_short": true,
                      "text": {
                        "tag": "lark_md",
                        "content": "${SHORT_ICON} Go Tests (Short)"
                      }
                    },
                    {
                      "is_short": true,
                      "text": {
                        "tag": "lark_md",
                        "content": "${FRAUD_ICON} Fraud Proof Tests"
                      }
                    },
                    {
                      "is_short": true,
                      "text": {
                        "tag": "lark_md",
                        "content": "${CONTRACTS_ICON} Contracts Tests"
                      }
                    },
                    {
                      "is_short": true,
                      "text": {
                        "tag": "lark_md",
                        "content": "${ACTIONS_ICON} E2E Actions"
                      }
                    },
                    {
                      "is_short": true,
                      "text": {
                        "tag": "lark_md",
                        "content": "${STATIC_ICON} Static Checks"
                      }
                    },
                    {
                      "is_short": true,
                      "text": {
                        "tag": "lark_md",
                        "content": "${WS_ICON} E2E WebSocket"
                      }
                    },
                    {
                      "is_short": true,
                      "text": {
                        "tag": "lark_md",
                        "content": "${HTTP_ICON} E2E HTTP"
                      }
                    },
                    {
                      "is_short": true,
                      "text": {
                        "tag": "lark_md",
                        "content": "${CANNON_ICON} Cannon VM"
                      }
                    }
                  ]
                },
                {
                  "tag": "hr"
                },
                {
                  "tag": "div",
                  "text": {
                    "tag": "lark_md",
                    "content": "**${STATUS_TEXT}**"
                  }
                },
                {
                  "tag": "action",
                  "actions": [
                    {
                      "tag": "button",
                      "text": {
                        "tag": "plain_text",
                        "content": "View Detailed Logs"
                      },
                      "type": "primary",
                      "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
          }
          EOF

          # Send to Lark/Feishu
          if [ -n "$LARK_WEBHOOK_URL" ]; then
            echo "Sending card notification to Lark..."

            response=$(curl -s -w "\n%{http_code}" -X POST "$LARK_WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d @lark_card.json)

            http_code=$(echo "$response" | tail -n1)
            response_body=$(echo "$response" | head -n-1)

            if [ "$http_code" -eq 200 ]; then
              echo "✅ Lark notification sent successfully"
              # Response body hidden for security
            else
              echo "❌ Failed to send Lark notification"
              echo "HTTP Code: $http_code"
              # Response body hidden for security
            fi
          else
            echo "⚠️ LARK_WEBHOOK_URL not configured. Skipping notification."
            echo ""
            echo "To enable Lark notifications:"
            echo "1. Go to GitHub repository Settings → Secrets → Actions"
            echo "2. Add a new secret named 'LARK_WEBHOOK_URL'"
            echo "3. Paste your Lark webhook URL as the value"
          fi

