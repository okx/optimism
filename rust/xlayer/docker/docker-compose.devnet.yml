# xlayer-node devnet services
#
# Single source of truth for ALL devnet infrastructure owned by xlayer-node:
#   - L1 (geth + beacon-chain + validator)  — ./l1/ static configs, ./l1/ runtime data
#   - op-batcher                             — reads from L2 xlayer-node, writes batches to L1
#
# xlayer-node itself runs as a native binary (not in Docker) — started by start-all.sh.
#
# Usage (via scripts — don't call directly):
#   ./scripts/devnet/1-start-l1.sh    # initialise + start L1
#   ./scripts/devnet/start-all.sh     # start xlayer-node + op-batcher (L1 must be up)
#   ./scripts/devnet/stop-all.sh      # stop everything

networks:
  xlayer-devnet:
    name: xlayer-devnet
    driver: bridge

services:

  # ── L1 init containers ──────────────────────────────────────────────────────
  # These run once on first start to set up L1 chain data.
  # On resume (docker compose start), these are NOT re-run — data is preserved.

  l1-geth-remove-db:
    image: "alpine:3.19.0"
    container_name: l1-geth-remove-db
    command: rm -rf /execution/geth
    volumes:
      - ./l1/execution:/execution
    networks:
      - xlayer-devnet

  l1-beacon-remove-db:
    image: "alpine:3.19.0"
    container_name: l1-beacon-remove-db
    command: rm -rf /consensus/beacondata /consensus/validatordata /consensus/genesis.ssz
    volumes:
      - ./l1/consensus:/consensus
    networks:
      - xlayer-devnet

  l1-create-beacon-chain-genesis:
    image: "gcr.io/prysmaticlabs/prysm/cmd/prysmctl:v7.0.0"
    container_name: l1-create-beacon-chain-genesis
    command:
      - testnet
      - generate-genesis
      - --fork=fulu
      - --num-validators=4
      - --genesis-time-delay=0
      - --output-ssz=/consensus/genesis.ssz
      - --chain-config-file=/consensus/config.yml
      - --geth-genesis-json-in=/execution/genesis-raw.json
      - --geth-genesis-json-out=/execution/genesis.json
    volumes:
      - ./l1/consensus:/consensus
      - ./l1/execution:/execution
    depends_on:
      l1-beacon-remove-db:
        condition: service_completed_successfully
    networks:
      - xlayer-devnet

  l1-fix-genesis-fork-times:
    image: "alpine:3.19.0"
    container_name: l1-fix-genesis-fork-times
    command:
      - /bin/sh
      - -c
      - |
        apk add --no-cache jq
        echo "Fixing genesis.json fork times..."
        sed -i 's/"shanghaiTime": [0-9]*/"shanghaiTime": 0/g' /execution/genesis.json
        sed -i 's/"cancunTime": [0-9]*/"cancunTime": 0/g' /execution/genesis.json
        echo "Adding pragueTime for Pectra support..."
        jq '.config.pragueTime = 0' /execution/genesis.json > /tmp/genesis.json && mv /tmp/genesis.json /execution/genesis.json
        echo "Adding osakaTime for Fusaka support..."
        jq '.config.osakaTime = 0' /execution/genesis.json > /tmp/genesis.json && mv /tmp/genesis.json /execution/genesis.json
        echo "Removing terminalTotalDifficultyPassed for op-node compatibility..."
        jq 'del(.config.terminalTotalDifficultyPassed)' /execution/genesis.json > /tmp/genesis.json && mv /tmp/genesis.json /execution/genesis.json
        echo "Genesis patched: shanghai=0, cancun=0, osaka=0, terminalTotalDifficultyPassed removed"
        cat /execution/genesis.json | jq '.config | {shanghaiTime, cancunTime, osakaTime}'
    volumes:
      - ./l1/execution:/execution
    depends_on:
      l1-create-beacon-chain-genesis:
        condition: service_completed_successfully
    networks:
      - xlayer-devnet

  l1-geth-genesis:
    image: "ethereum/client-go:v1.16.7"
    container_name: l1-geth-genesis
    command: --datadir=/execution --gcmode=archive init --state.scheme=hash /execution/genesis.json
    volumes:
      - ./l1/execution:/execution
    depends_on:
      l1-fix-genesis-fork-times:
        condition: service_completed_successfully
      l1-geth-remove-db:
        condition: service_completed_successfully
    networks:
      - xlayer-devnet

  # ── L1 runtime services ─────────────────────────────────────────────────────

  l1-geth:
    image: "ethereum/client-go:v1.16.7"
    container_name: l1-geth
    command:
      - --http
      - --http.api=eth,net,web3,debug,admin,txpool
      - --http.addr=0.0.0.0
      - --http.corsdomain=*
      - --http.vhosts=*
      - --ws
      - --ws.api=eth,net,web3,debug,txpool
      - --ws.addr=0.0.0.0
      - --ws.origins=*
      - --authrpc.vhosts=*
      - --authrpc.addr=0.0.0.0
      - --authrpc.jwtsecret=/execution/jwtsecret
      - --datadir=/execution
      - --nodiscover
      - --syncmode=full
      - --gcmode=archive
      - --ipcdisable
      - --rpc.allow-unprotected-txs
      - --verbosity=3
      - --miner.gasprice=1
      - --txpool.pricelimit=0
      - --txpool.pricebump=10
      - --txpool.accountslots=100000
      - --txpool.globalslots=100000
      - --txpool.accountqueue=100000
      - --txpool.globalqueue=100000
      - --miner.gaslimit=100000000
    ports:
      - "8545:8545"
      - "8546:8546"
      - "8551:8551"
    volumes:
      - ./l1/execution:/execution
    depends_on:
      l1-geth-genesis:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8545"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xlayer-devnet

  l1-beacon-chain:
    image: "gcr.io/prysmaticlabs/prysm/beacon-chain:v7.0.0"
    container_name: l1-beacon-chain
    command:
      - --datadir=/consensus/beacondata
      - --min-sync-peers=0
      - --genesis-state=/consensus/genesis.ssz
      - --bootstrap-node=
      - --interop-eth1data-votes
      - --chain-config-file=/consensus/config.yml
      - --contract-deployment-block=0
      - --chain-id=${L1_CHAIN_ID:-1337}
      - --rpc-host=0.0.0.0
      - --grpc-gateway-host=0.0.0.0
      - --execution-endpoint=http://l1-geth:8551
      - --accept-terms-of-use
      - --jwt-secret=/execution/jwtsecret
      - --suggested-fee-recipient=0x123463a4b065722e99115d6c222f267d9cabb524
      - --minimum-peers-per-subnet=0
      - --blob-retention-epochs=75600
      - --verbosity=info
    ports:
      - "3500:3500"
      - "4000:4000"
    volumes:
      - ./l1/consensus:/consensus
      - ./l1/execution:/execution
    depends_on:
      l1-create-beacon-chain-genesis:
        condition: service_completed_successfully
      l1-geth:
        condition: service_healthy
    networks:
      - xlayer-devnet

  l1-validator:
    image: "gcr.io/prysmaticlabs/prysm/validator:v7.0.0"
    container_name: l1-validator
    command:
      - --beacon-rpc-provider=l1-beacon-chain:4000
      - --datadir=/consensus/validatordata
      - --accept-terms-of-use
      - --interop-num-validators=4
      - --interop-start-index=0
      - --chain-config-file=/consensus/config.yml
      - --verbosity=info
    volumes:
      - ./l1/consensus:/consensus
    depends_on:
      l1-beacon-chain:
        condition: service_started
    networks:
      - xlayer-devnet

  # ── op-batcher ─────────────────────────────────────────────────────────────
  # Reads unsafe L2 blocks from xlayer-node, batches them to L1.
  # Reaches xlayer-node via host.docker.internal; reaches L1 via container network.
  op-batcher:
    image: "${OP_STACK_IMAGE_TAG:-op-stack:latest}"
    container_name: op-batcher
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - /app/op-batcher/bin/op-batcher
      - --log.level=info
      - --l2-eth-rpc=http://host.docker.internal:${L2_HTTP_PORT:-8123}
      - --rollup-rpc=http://host.docker.internal:${L2_ROLLUP_PORT:-9545}
      - --l1-eth-rpc=http://l1-geth:8545
      - --private-key=${OP_BATCHER_PRIVATE_KEY}
      - --poll-interval=2s
      - --batch-type=1
      - --compression-algo=brotli-10
      - --data-availability-type=auto
      - --sub-safety-margin=6
      - --num-confirmations=${BATCHER_NUM_CONFIRMATIONS:-1}
      - --safe-abort-nonce-too-low-count=3
      - --resubmission-timeout=30s
      - --rpc.addr=0.0.0.0
      - --rpc.port=8548
      - --rpc.enable-admin
      - --max-channel-duration=${BATCHER_MAX_CHANNEL_DURATION:-10}
      - --max-pending-tx=10
      - --target-num-frames=6
    ports:
      - "127.0.0.1:8548:8548"   # admin RPC — localhost only
    networks:
      - xlayer-devnet
    restart: unless-stopped
